<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook  Login </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

.logo{
    color:#1877f2;
    font-size:48px;
    font-weight:bold;
    margin-bottom:20px;
}

.card{
    background:white;
    width:350px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#1877f2;
    color:white;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#166fe5;
}

a{
    display:block;
    margin:15px 0;
    color:#1877f2;
    text-decoration:none;
}

.create{
    background:#42b72a;
}

.create:hover{
    background:#36a420;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">Facebook </div>

<div class="card">

<input type="text" placeholder="Email or Phone">

<input type="password" placeholder="Password">

<button>Log In</button>

<a href="#">Forgot Password?</a>

<hr style="margin:20px 0;">

<button class="create">Create New Account</button>

</div>

</div>

</body>
</html>
